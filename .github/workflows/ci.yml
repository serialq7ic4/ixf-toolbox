name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test harness Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
      - name: Install test tools
        run: python -m pip install "pytest>=8.0" "ruff>=0.5"
      - name: Compile Python test harness
        run: python -m compileall -q tests scripts
      - name: Run tests
        run: python -m pytest -q
      - name: Run Go tests
        run: go test ./...
      - name: Ruff check
        run: python -m ruff check .

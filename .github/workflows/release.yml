name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
      - name: Validate tag and version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          version="$(cat VERSION)"
          expected="v${version}"
          actual="${RELEASE_TAG}"
          if [ "${actual}" != "${expected}" ]; then
            echo "tag ${actual} does not match VERSION ${expected}" >&2
            exit 1
          fi
      - name: Run Go tests
        run: go test ./...
      - name: Run Go vet
        run: go vet ./...
      - name: Build Go binary artifacts
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          for target in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64 windows/amd64; do
            goos="${target%/*}"
            goarch="${target#*/}"
            artifact="ixf_${RELEASE_VERSION}_${goos}_${goarch}"
            if [ "${goos}" = "windows" ]; then
              artifact="${artifact}.exe"
            fi
            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 \
              go build -trimpath -ldflags "-s -w -X main.version=${RELEASE_VERSION}" \
              -o "dist/${artifact}" ./cmd/ixf
          done
          (cd dist && sha256sum ixf_${RELEASE_VERSION}_* > "ixf_${RELEASE_VERSION}_checksums.txt")
      - name: Smoke Go release binary
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          scripts/smoke-go-binary.sh "dist/ixf_${RELEASE_VERSION}_linux_amd64" "${RELEASE_VERSION}"
      - name: Extract release notes
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          awk -v version="${version}" '
            $0 ~ "^## " version "([[:space:]-]|$)" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md | sed '/^[[:space:]]*$/d' > release-notes.md
          test -s release-notes.md
      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ixf-toolbox-dist
          path: dist/*
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: dist/*

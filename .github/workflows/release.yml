name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
      - name: Install package and build tools
        run: python -m pip install -e ".[dev]"
      - name: Validate tag and package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import tomllib

          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          expected = f"v{version}"
          actual = os.environ["RELEASE_TAG"]
          if actual != expected:
              raise SystemExit(f"tag {actual!r} does not match package version {expected!r}")
          PY
      - name: Compile source
        run: python -m compileall -q src
      - name: Run tests
        run: python -m pytest -q
      - name: Run Go tests
        run: go test ./...
      - name: Ruff check
        run: python -m ruff check .
      - name: Build distributions
        run: python -m build
      - name: Build Go binary artifacts
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          for target in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64 windows/amd64; do
            goos="${target%/*}"
            goarch="${target#*/}"
            artifact="ixf_${RELEASE_VERSION}_${goos}_${goarch}"
            if [ "${goos}" = "windows" ]; then
              artifact="${artifact}.exe"
            fi
            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 \
              go build -trimpath -ldflags "-s -w -X main.version=${RELEASE_VERSION}" \
              -o "dist/${artifact}" ./cmd/ixf
          done
          (cd dist && sha256sum ixf_${RELEASE_VERSION}_* > "ixf_${RELEASE_VERSION}_checksums.txt")
      - name: Smoke Go release binary
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          scripts/smoke-go-binary.sh "dist/ixf_${RELEASE_VERSION}_linux_amd64" "${RELEASE_VERSION}"
      - name: Extract release notes
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: python scripts/extract_changelog.py "${RELEASE_TAG#v}" CHANGELOG.md > release-notes.md
      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ixf-toolbox-dist
          path: dist/*
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: dist/*
